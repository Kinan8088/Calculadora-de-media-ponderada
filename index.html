<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Media Ponderada</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="lang-selector">
      <label for="lang">Idioma:</label>
      <select id="lang">
        <option value="es" selected>Español</option>
        <option value="en">English</option>
      </select>
    </div>

    <h2 id="title">Calculadora de Nota Media Ponderada</h2>

    <!-- Mensaje principal de errores -->
    <div id="error" class="error" role="alert"></div>

    <table id="data-table">
      <thead>
        <tr>
          <th id="th-number">Número</th>
          <th id="th-weight">Peso (%)</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr id="new-row">
          <td>
            <input type="number" id="new-number" placeholder="Número" step="any" />
            <div id="error-number" class="field-error"></div>
          </td>
          <td>
            <input type="number" id="new-weight" placeholder="Peso %" step="any" />
            <div id="error-weight" class="field-error"></div>
          </td>
          <td>
            <button id="add-button" onclick="agregarFila()">+</button>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Barra de progreso de pesos -->
    <div class="progress-container">
      <label id="label-total-weights">Total pesos: <span id="total-weight">0%</span></label>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </div>

    <div class="controls">
      <button id="btn-calc" onclick="calcularMedia()">Calcular media</button>
      <button id="btn-reset" onclick="resetear()">Resetear</button>
    </div>

    <div class="results">
      <p id="arithmetic-media"></p>
      <p id="weighted-media"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
